# 'ADJACENT' | 'NONE' | 'COVER' | 'FULLSCREEN'
# COVER overlays the chat history but leaves the input box
# FULLSCREEN covers everything except the header
position: 'FULLSCREEN'


config_schema:
  type: object
  properties:
    beta_mode:
      title: Beta Mode
      description: Enable experimental beta features.
      type: string
      default: "False"
      enum: ["True", "False"]

# The schema of the state that you store.
# This isn't needed even if you do store state,
#   and is here more for future use cases to
#   optimize storage.
state_schema:
  init:
    type: object
    properties:
      grid:
        type: string
  message:
    type: object
    properties:
      angry:
        type: boolean
        default: true
  chat:
    type: object
    properties:
      visited:
        type: array
        items:
          type: integer
          
github_path: 'https://github.com/sadfwerf/testingout'


extension_id: 'testingout-e193436c2e05'

